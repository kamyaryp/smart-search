<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Android Frame - Smart Search</title>

<style>
* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% 0%, #2c2c34 0%, #111 48%, #050505 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.frame-wrap {
  width: min(92vw, 430px);
  padding: 18px;
}

.phone {
  position: relative;
  width: 100%;
  aspect-ratio: 9 / 19.5;
  max-height: 92vh;
  margin: 0 auto;
  padding: 14px;
  border-radius: 46px;
  background: linear-gradient(145deg, #2b2b2f, #050505);
  box-shadow:
    0 34px 90px rgba(0, 0, 0, .65),
    inset 0 0 0 2px rgba(255,255,255,.08),
    inset 0 0 0 7px #111;
}

.screen {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: 34px;
  background: #fff;
}






iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #fff;
}

.nav-bar {
  position: absolute;
  left: 50%;
  bottom: 8px;
  z-index: 6;
  width: 112px;
  height: 4px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: rgba(0,0,0,.28);
  pointer-events: none;
}

.caption {
  margin-top: 16px;
  text-align: center;
  color: rgba(255,255,255,.7);
  font-size: 13px;
}
</style>
</head>

<body>
  <main class="frame-wrap">
    <div class="phone">
      <div class="screen">
        <iframe src="index.html" title="Smart Search Android Preview"></iframe>

        <div class="nav-bar"></div>
      </div>
    </div>

    <div class="caption">Android preview frame</div>
  </main>
</body>
</html>
