<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Android Frame - Smart Search</title>

<style>
* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% 0%, #2c2c34 0%, #111 48%, #050505 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.frame-wrap {
  width: min(92vw, 430px);
  padding: 18px;
}

.phone {
  position: relative;
  width: 100%;
  aspect-ratio: 9 / 19.5;
  max-height: 92vh;
  margin: 0 auto;
  padding: 14px;
  border-radius: 46px;
  background: linear-gradient(145deg, #2b2b2f, #050505);
  box-shadow:
    0 34px 90px rgba(0, 0, 0, .65),
    inset 0 0 0 2px rgba(255,255,255,.08),
    inset 0 0 0 7px #111;
}

.screen {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: 34px;
  background: #fff;
}

.status-bar {
  position: absolute;
  inset-inline: 0;
  top: 0;
  z-index: 5;
  height: 28px;
  padding: 7px 18px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  color: #20242e;
  font-size: 11px;
  font-weight: 700;
  pointer-events: none;
}

.status-icons {
  display: flex;
  gap: 5px;
  align-items: center;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
  opacity: .8;
}

.camera {
  position: absolute;
  top: 10px;
  left: 50%;
  z-index: 8;
  width: 74px;
  height: 22px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: #090909;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
}

.camera::after {
  content: "";
  position: absolute;
  top: 7px;
  right: 11px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle, #2d405f 0%, #060606 65%);
}

iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #fff;
}

.nav-bar {
  position: absolute;
  left: 50%;
  bottom: 8px;
  z-index: 6;
  width: 112px;
  height: 4px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: rgba(0,0,0,.28);
  pointer-events: none;
}

.caption {
  margin-top: 16px;
  text-align: center;
  color: rgba(255,255,255,.7);
  font-size: 13px;
}
</style>
</head>

<body>
  <main class="frame-wrap">
    <div class="phone">
      <div class="screen">
        <div class="status-bar">
          <span>9:41</span>
          <span class="status-icons">
            <span class="dot"></span>
            <span class="dot"></span>
            <span>85%</span>
          </span>
        </div>

        <div class="camera"></div>

        <iframe src="index.html" title="Smart Search Android Preview"></iframe>

        <div class="nav-bar"></div>
      </div>
    </div>

    <div class="caption">Android preview frame</div>
  </main>
</body>
</html>
